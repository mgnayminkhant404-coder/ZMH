<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 22 Birthday Celebration 🎉✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020205; 
            font-family: 'Pyidaungsu', serif;
            overflow: hidden;
            perspective: 2000px;
        }

        #starCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .box-container {
            position: relative;
            width: 180px;
            height: 180px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            z-index: 10;
        }

        .box-body {
            width: 100%; height: 100%;
            background: #ff2d75;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 45, 117, 0.4);
        }

        .box-body::before { content: ""; position: absolute; left: 50%; top: 0; width: 25px; height: 100%; background: #ffd700; transform: translateX(-50%); }
        .box-body::after { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 25px; background: #ffd700; transform: translateY(-50%); }

        .box-lid {
            width: 200px; height: 45px;
            background: #d81b60;
            position: absolute;
            top: -20px; left: -10px;
            border-radius: 5px;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 20;
        }

        .friend-photo {
            width: 170px;
            height: 240px;
            position: absolute;
            bottom: 5px; left: 5px;
            background: white;
            padding: 5px;
            border-radius: 6px;
            transform: scale(0);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
            overflow: hidden;
        }

        .friend-photo img { width: 100%; height: 100%; object-fit: cover; }

        .open .friend-photo { transform: scale(1.1) translateY(-230px); z-index: 50; border: 3px solid #00e5ff; box-shadow: 0 0 25px #00e5ff; }

        .wish-area {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            width: 90%; max-width: 420px;
            background: rgba(10, 10, 15, 0.96);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 25px;
            color: white;
            z-index: 500;
            border: 1px solid rgba(0, 229, 255, 0.4);
            text-align: center;
            opacity: 0; visibility: hidden;
            transition: all 0.5s ease;
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        .wish-area.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        /* 💡 Final Neon Floating State 💡 */
        .final-state .friend-photo {
            position: fixed;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%) scale(1.4);
            border: 4px solid white;
            animation: rainbowGlow 6s linear infinite alternate, floatingEffect 3s ease-in-out infinite alternate;
            z-index: 100;
        }

        @keyframes rainbowGlow {
            0% { border-color: #ffd700; box-shadow: 0 0 30px #ffd700; }
            33% { border-color: #ff007f; box-shadow: 0 0 30px #ff007f; }
            66% { border-color: #00e5ff; box-shadow: 0 0 30px #00e5ff; }
            100% { border-color: #7fff00; box-shadow: 0 0 30px #7fff00; }
        }

        @keyframes floatingEffect {
            0%, 100% { transform: translate(-50%, -50%) scale(1.4) translateY(0); }
            50% { transform: translate(-50%, -50%) scale(1.4) translateY(-20px); }
        }

        /* Continuous Gift Rain */
        .rain-item {
            position: absolute;
            top: -50px;
            z-index: 80;
            pointer-events: none;
            animation: fallingRain linear forwards;
        }

        @keyframes fallingRain {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Buttons */
        .btn-container { position: fixed; bottom: 30px; z-index: 600; }
        .btn {
            padding: 15px 30px;
            background: transparent;
            color: #00e5ff;
            border: 2px solid #00e5ff;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        #readAgainBtn {
            display: none;
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 600;
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <div class="box-container" id="giftBox">
        <div class="box-lid"></div>
        <div class="box-body"></div>
        <div class="friend-photo" id="photoFrame">
            <img src="memory.jpg" alt="Birthday Star">
        </div>
    </div>

    <div class="wish-area" id="wishArea">
        <h2 style="color:#ff007f; text-shadow: 0 0 10px #ff007f; margin-bottom: 15px;">Happy 22nd Birthday! ✨</h2>
        <div id="wishText" style="line-height:1.7; font-size: 0.95rem; text-align:justify; color: #eee;"></div>
        <div style="font-size: 1.8rem; margin-top: 15px;">🎂🎈💖🍰🎁</div>
        <button onclick="closeCelebration()" style="margin-top: 20px; background: #ff007f; border: none; color: white; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(255,0,127,0.4);">ပိတ်မယ် [x]</button>
    </div>

    <div class="btn-container" id="startBtnContainer">
        <button class="btn" onclick="celebrate()">မွေးနေ့လက်ဆောင်ဖွင့်မယ် 🎁</button>
    </div>

    <button id="readAgainBtn" class="btn" onclick="reopenWish()">ဆုတောင်းစာ ပြန်ဖတ်မယ် ✉️</button>

    <audio id="hbdMusic" loop><source src="hbd_song.mp3" type="audio/mpeg"></audio>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let rainInterval;

        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<100; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.3 });
        }
        initStars();
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "white";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y += s.speed; if(s.y > canvas.height) s.y = 0; });
            requestAnimationFrame(animate);
        }
        animate();

        // 🎉 ကိုကိုပေးထားတဲ့ ဆုတောင်းစာသား
        const message = "Happy 22nd Birthday! အသက် ၂၂ ဆိုတာ ဘဝရဲ့ Level 22 ကို တက်လှမ်းလိုက်တာပဲ။ ပိုပြီးရင့်ကျက်၊ ပိုပြီးလန်းပြီး ကိုယ်ဖြစ်ချင်တဲ့ အိမ်မက်တွေဆီကို အရှိန်အဟုန်နဲ့ ရှေ့ဆက်နိုင်ပါစေ။ \n\nအခုဖြေဆိုထားတဲ့ Final Year စာမေးပွဲကြီးမှာလည်း ဂုဏ်ထူးတွေနဲ့ အောင်မြင်မှုသရဖူ ဆောင်းနိုင်ပါစေ။ ဒါ့အပြင် မိဘတွေအတွက်လည်း အားကိုးထိုက်တဲ့၊ ဂုဏ်ယူရတဲ့ သားကောင်း/သမီးကောင်းတစ်ယောက်အဖြစ် ရှေ့ဆက်နိုင်ပါစေဦး။ မင်းရဲ့ ၂၂ နှစ်မြောက်နှစ်က အောင်မြင်မှုတွေ၊ ပျော်ရွှင်မှုတွေနဲ့ပဲ ပြည့်နှက်နေပါစေကွာ။ ❤️🎂";

        function celebrate() {
            document.getElementById('giftBox').classList.add('open');
            document.getElementById('startBtnContainer').style.display = 'none';
            document.getElementById('hbdMusic').play().catch(() => {});
            setTimeout(() => {
                document.getElementById('wishArea').classList.add('active');
                typeMessage();
            }, 1200);
        }

        function typeMessage() {
            let i = 0;
            const container = document.getElementById('wishText');
            container.innerHTML = "";
            // Hide read again button while typing
            document.getElementById('readAgainBtn').style.opacity = '0';
            
            function type() {
                if (i < message.length) {
                    container.innerHTML += message.charAt(i);
                    i++;
                    setTimeout(type, 35);
                } else {
                    if(document.body.classList.contains('final-state')) {
                        document.getElementById('readAgainBtn').style.opacity = '1';
                    }
                }
            }
            type();
        }

        function closeCelebration() {
            document.getElementById('wishArea').classList.remove('active');
            document.body.classList.add('final-state');
            
            // Remove box parts
            const boxBody = document.querySelector('.box-body');
            const boxLid = document.querySelector('.box-lid');
            if(boxBody) boxBody.style.display = 'none';
            if(boxLid) boxLid.style.display = 'none';

            // Bring photo to body center
            document.body.appendChild(document.getElementById('photoFrame'));
            
            // Show Read Again Button
            const readBtn = document.getElementById('readAgainBtn');
            readBtn.style.display = 'block';
            setTimeout(() => readBtn.style.opacity = '1', 100);

            // Start Infinite Rain of Gifts
            if(!rainInterval) {
                rainInterval = setInterval(createRainItem, 400);
            }
        }

        function reopenWish() {
            document.getElementById('wishArea').classList.add('active');
            typeMessage();
        }

        function createRainItem() {
            const items = ['💐', '🎁', '🍺', '🍓', '🍌', '🍇', '🎂', '🍭', '💖', '✨', '🎓'];
            const div = document.createElement('div');
            div.className = 'rain-item';
            div.innerHTML = items[Math.floor(Math.random() * items.length)];
            div.style.left = Math.random() * 100 + 'vw';
            div.style.fontSize = (Math.random() * 20 + 20) + 'px';
            div.style.animationDuration = (Math.random() * 3 + 2.5) + 's';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 5500);
        }

        // Tilt effect logic
        document.addEventListener('mousemove', (e) => {
            if(document.body.classList.contains('final-state')){
                const photoFrame = document.getElementById('photoFrame');
                let x = (window.innerWidth / 2 - e.pageX) / 25;
                let y = (window.innerHeight / 2 - e.pageY) / 25;
                photoFrame.style.transform = `translate(-50%, -50%) scale(1.4) rotateX(${y}deg) rotateY(${-x}deg)`;
            }
        });
    </script>
</body>
</html>
